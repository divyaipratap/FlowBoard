name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck desktop
        run: pnpm --filter @workspace/desktop run typecheck

      - name: Build Windows installer
        run: pnpm --filter @workspace/desktop run make:win:unsigned

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flowboard-windows
          path: |
            artifacts/desktop/release/*.exe
            artifacts/desktop/release/*.blockmap

  macos:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck desktop
        run: pnpm --filter @workspace/desktop run typecheck

      - name: Build macOS DMG
        run: pnpm --filter @workspace/desktop run make:mac:unsigned

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flowboard-macos
          path: |
            artifacts/desktop/release/*.dmg
            artifacts/desktop/release/*.blockmap
