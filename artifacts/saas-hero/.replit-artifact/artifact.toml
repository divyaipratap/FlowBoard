kind = "web"
previewPath = "/"
title = "SaaS Hero Animation"
version = "1.0.0"
id = "artifacts/saas-hero"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21787

[services.development]
run = "pnpm --filter @workspace/saas-hero run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/saas-hero", "run", "build" ]
publicDir = "artifacts/saas-hero/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21787"
BASE_PATH = "/"
