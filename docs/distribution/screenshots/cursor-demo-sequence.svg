<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-label="Cursor to FlowBoard demo sequence">
  <rect width="1600" height="1000" fill="#050813"/>
  <text x="90" y="105" fill="#f7fbff" font-family="Inter,Segoe UI,sans-serif" font-size="52" font-weight="850">Cursor in 60 seconds</text>
  <text x="90" y="150" fill="#9ba8bd" font-family="Inter,Segoe UI,sans-serif" font-size="25">Install MCP, pick a ticket, attach WorkProof, complete verified work.</text>
  <g font-family="Inter,Segoe UI,sans-serif">
    <rect x="90" y="220" width="420" height="560" rx="24" fill="#101d31" stroke="#284966"/>
    <text x="130" y="290" fill="#10c7d8" font-size="26" font-weight="800">01 Install</text>
    <text x="130" y="350" fill="#f7fbff" font-size="31" font-weight="800">Copy MCP config</text>
    <rect x="130" y="395" width="330" height="190" rx="16" fill="#081220"/>
    <text x="160" y="455" fill="#dce7fa" font-size="20">"flowboard": {</text>
    <text x="180" y="495" fill="#dce7fa" font-size="20">"command": "node"</text>
    <text x="180" y="535" fill="#dce7fa" font-size="20">"--api-port-file"</text>
    <text x="160" y="575" fill="#dce7fa" font-size="20">}</text>
    <rect x="590" y="220" width="420" height="560" rx="24" fill="#101d31" stroke="#284966"/>
    <text x="630" y="290" fill="#10c7d8" font-size="26" font-weight="800">02 Execute</text>
    <text x="630" y="350" fill="#f7fbff" font-size="31" font-weight="800">Pick a ticket</text>
    <rect x="630" y="395" width="330" height="92" rx="16" fill="#081220"/>
    <text x="660" y="450" fill="#dce7fa" font-size="20">Pick LAUNCH-7 and execute.</text>
    <rect x="630" y="535" width="330" height="92" rx="16" fill="#0d9488"/>
    <text x="660" y="591" fill="#ffffff" font-size="20" font-weight="800">Agent runs checks</text>
    <rect x="1090" y="220" width="420" height="560" rx="24" fill="#101d31" stroke="#284966"/>
    <text x="1130" y="290" fill="#10c7d8" font-size="26" font-weight="800">03 Verify</text>
    <text x="1130" y="350" fill="#f7fbff" font-size="31" font-weight="800">WorkProof completes</text>
    <circle cx="1220" cy="500" r="70" fill="#0d9488"/>
    <path d="M1188 500l25 28 55-70" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1130" y="650" fill="#dce7fa" font-size="24">Done only after green proof.</text>
  </g>
</svg>

