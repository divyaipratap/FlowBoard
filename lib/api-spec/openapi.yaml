openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Project management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Project operations
  - name: statuses
    description: Project status operations
  - name: issues
    description: Issue/ticket operations
  - name: comments
    description: Comment operations
  - name: attachments
    description: Issue attachment operations
  - name: pulse
    description: Pulse planning operations
  - name: flow-sessions
    description: Focus session operations
  - name: daily-review
    description: End-of-day review operations
  - name: data
    description: Local data management operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /projects/{projectId}/summary:
    get:
      operationId: getProjectSummary
      tags: [projects]
      summary: Get project summary stats
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSummary"

  /projects/{projectId}/statuses:
    get:
      operationId: listProjectStatuses
      tags: [statuses]
      summary: List project statuses
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of project statuses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectStatus"
    put:
      operationId: updateProjectStatuses
      tags: [statuses]
      summary: Replace project statuses
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectStatusesBody"
      responses:
        "200":
          description: Updated project statuses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectStatus"

  /projects/{projectId}/issues:
    get:
      operationId: listIssues
      tags: [issues]
      summary: List issues for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: assignee
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of issues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Issue"
    post:
      operationId: createIssue
      tags: [issues]
      summary: Create an issue
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIssueBody"
      responses:
        "201":
          description: Created issue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"

  /issues/{issueId}:
    get:
      operationId: getIssue
      tags: [issues]
      summary: Get an issue
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Issue detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueDetail"
        "404":
          description: Not found
    patch:
      operationId: updateIssue
      tags: [issues]
      summary: Update an issue
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIssueBody"
      responses:
        "200":
          description: Updated issue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
    delete:
      operationId: deleteIssue
      tags: [issues]
      summary: Delete an issue
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /issues/{issueId}/comments:
    get:
      operationId: listComments
      tags: [comments]
      summary: List comments on an issue
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [comments]
      summary: Add a comment to an issue
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentBody"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /comments/{commentId}:
    delete:
      operationId: deleteComment
      tags: [comments]
      summary: Delete a comment
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /issues/{issueId}/attachments:
    get:
      operationId: listAttachments
      tags: [attachments]
      summary: List attachments on an issue
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attachment"
    post:
      operationId: createAttachment
      tags: [attachments]
      summary: Attach a file to an issue
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttachmentBody"
      responses:
        "201":
          description: Created attachment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attachment"

  /attachments/{attachmentId}:
    delete:
      operationId: deleteAttachment
      tags: [attachments]
      summary: Delete an attachment
      parameters:
        - name: attachmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /pulse/today:
    get:
      operationId: getPulseToday
      tags: [pulse]
      summary: Get today's Pulse plan
      responses:
        "200":
          description: Pulse plan for today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PulseTodayResponse"

  /pulse/recompute:
    post:
      operationId: recomputePulse
      tags: [pulse]
      summary: Recompute Pulse scores
      responses:
        "200":
          description: Recomputed pulse scores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PulseRecomputeResponse"

  /flow-sessions/start:
    post:
      operationId: startFlowSession
      tags: [flow-sessions]
      summary: Start a flow session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartFlowSessionRequest"
      responses:
        "200":
          description: Started flow session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartFlowSessionResponse"

  /flow-sessions/{id}/stop:
    post:
      operationId: stopFlowSession
      tags: [flow-sessions]
      summary: Stop a flow session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StopFlowSessionRequest"
      responses:
        "200":
          description: Stopped flow session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopFlowSessionResponse"

  /daily-review:
    post:
      operationId: saveDailyReview
      tags: [daily-review]
      summary: Save daily review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveDailyReviewRequest"
      responses:
        "200":
          description: Saved daily review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveDailyReviewResponse"

  /data:
    delete:
      operationId: deleteAllData
      tags: [data]
      summary: Delete all local app data
      responses:
        "204":
          description: Deleted all local data

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        key:
          type: string
          description: Short uppercase identifier e.g. "PROJ"
        description:
          type: string
        color:
          type: string
        issueCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, name, key, color, issueCount, createdAt]

    CreateProjectBody:
      type: object
      properties:
        name:
          type: string
        key:
          type: string
        description:
          type: string
        color:
          type: string
        statuses:
          type: array
          items:
            $ref: "#/components/schemas/ProjectStatusInput"
      required: [name, key]

    UpdateProjectBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        color:
          type: string

    ProjectSummary:
      type: object
      properties:
        projectId:
          type: string
        totalIssues:
          type: integer
        byStatus:
          type: object
          additionalProperties:
            type: integer
        byPriority:
          type: object
          additionalProperties:
            type: integer
        byType:
          type: object
          additionalProperties:
            type: integer
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/Issue"
      required: [projectId, totalIssues, byStatus, byPriority, byType, recentActivity]

    ProjectStatus:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        name:
          type: string
        color:
          type: string
        position:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, projectId, name, color, position, createdAt]

    ProjectStatusInput:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        color:
          type: string
        position:
          type: integer
      required: [name, color, position]

    UpdateProjectStatusesBody:
      type: object
      properties:
        statuses:
          type: array
          items:
            $ref: "#/components/schemas/ProjectStatusInput"
      required: [statuses]

    Issue:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        issueKey:
          type: string
          description: e.g. "PROJ-42"
        title:
          type: string
        status:
          type: string
        priority:
          type: string
          enum: [low, medium, high, critical]
        type:
          type: string
          enum: [task, bug, feature, story]
        assignee:
          type: string
          nullable: true
        reporter:
          type: string
        labels:
          type: array
          items:
            type: string
        commentCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, projectId, issueKey, title, status, priority, type, reporter, labels, commentCount, createdAt, updatedAt]

    IssueDetail:
      allOf:
        - $ref: "#/components/schemas/Issue"
        - type: object
          properties:
            description:
              type: string
              nullable: true
            comments:
              type: array
              items:
                $ref: "#/components/schemas/Comment"
          required: [comments]

    CreateIssueBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
          enum: [low, medium, high, critical]
        type:
          type: string
          enum: [task, bug, feature, story]
        assignee:
          type: string
        reporter:
          type: string
        labels:
          type: array
          items:
            type: string
      required: [title, type]

    UpdateIssueBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
          enum: [low, medium, high, critical]
        type:
          type: string
          enum: [task, bug, feature, story]
        assignee:
          type: string
        labels:
          type: array
          items:
            type: string

    Comment:
      type: object
      properties:
        id:
          type: string
        issueId:
          type: string
        content:
          type: string
        author:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, issueId, content, author, createdAt]

    CreateCommentBody:
      type: object
      properties:
        content:
          type: string
        author:
          type: string
      required: [content, author]

    Attachment:
      type: object
      properties:
        id:
          type: string
        issueId:
          type: string
        fileName:
          type: string
        mimeType:
          type: string
        kind:
          type: string
          enum: [image, text]
        sizeBytes:
          type: integer
        content:
          type: string
          description: Data URL for images, plain text for text files
        createdAt:
          type: string
          format: date-time
      required: [id, issueId, fileName, mimeType, kind, sizeBytes, content, createdAt]

    CreateAttachmentBody:
      type: object
      properties:
        fileName:
          type: string
        mimeType:
          type: string
        kind:
          type: string
          enum: [image, text]
        sizeBytes:
          type: integer
        content:
          type: string
      required: [fileName, mimeType, kind, sizeBytes, content]

    PulseTask:
      type: object
      properties:
        issueId:
          type: string
        projectId:
          type: string
        issueKey:
          type: string
        title:
          type: string
        projectName:
          type: string
        priority:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
        dueDate:
          type: string
          nullable: true
        reason:
          type: string
        order:
          type: integer
        estimateBlocks:
          type: integer
        score:
          type: integer
      required: [issueId, projectId, issueKey, title, projectName, priority, status, reason, order, estimateBlocks, score]

    ProjectNextAction:
      type: object
      properties:
        projectId:
          type: string
        projectName:
          type: string
        action:
          type: string
        reason:
          type: string
        issueId:
          type: string
          nullable: true
        issueKey:
          type: string
          nullable: true
        issueTitle:
          type: string
          nullable: true
      required: [projectId, projectName, action, reason]

    PulseRisk:
      type: object
      properties:
        type:
          type: string
        severity:
          type: string
          enum: [low, medium, high]
        title:
          type: string
        description:
          type: string
        suggestedFix:
          type: string
        projectId:
          type: string
          nullable: true
        issueIds:
          type: array
          items:
            type: string
      required: [type, severity, title, description, suggestedFix, issueIds]

    PulseTodayResponse:
      type: object
      properties:
        date:
          type: string
        topTasks:
          type: array
          items:
            $ref: "#/components/schemas/PulseTask"
        projectNextActions:
          type: array
          items:
            $ref: "#/components/schemas/ProjectNextAction"
        risks:
          type: array
          items:
            $ref: "#/components/schemas/PulseRisk"
        reviewPrompt:
          type: string
      required: [date, topTasks, projectNextActions, risks, reviewPrompt]

    PulseRecomputeResponse:
      type: object
      properties:
        ok:
          type: boolean
        computedAt:
          type: string
          format: date-time
      required: [ok, computedAt]

    FlowSession:
      type: object
      properties:
        id:
          type: string
        issueId:
          type: string
          nullable: true
        projectId:
          type: string
          nullable: true
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
          nullable: true
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, startedAt, createdAt, updatedAt]

    DailyReview:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
        summary:
          type: string
          nullable: true
        completedIssueIds:
          type: array
          items:
            type: string
        carriedIssueIds:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, date, completedIssueIds, carriedIssueIds, createdAt, updatedAt]

    StartFlowSessionRequest:
      type: object
      properties:
        issueId:
          type: string
      required: [issueId]

    StartFlowSessionResponse:
      type: object
      properties:
        session:
          $ref: "#/components/schemas/FlowSession"
      required: [session]

    StopFlowSessionRequest:
      type: object
      properties:
        note:
          type: string

    StopFlowSessionResponse:
      type: object
      properties:
        session:
          $ref: "#/components/schemas/FlowSession"
      required: [session]

    SaveDailyReviewRequest:
      type: object
      properties:
        date:
          type: string
        summary:
          type: string
        completedIssueIds:
          type: array
          items:
            type: string
        carriedIssueIds:
          type: array
          items:
            type: string
      required: [date]

    SaveDailyReviewResponse:
      type: object
      properties:
        review:
          $ref: "#/components/schemas/DailyReview"
      required: [review]
